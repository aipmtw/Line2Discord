const categories=[...new Set(agents.map(a=>a.c))].sort();
const filtersEl=document.getElementById('filters');
const gridEl=document.getElementById('grid');
const statsEl=document.getElementById('stats');
const searchEl=document.getElementById('search');
let activeFilter='all';

filtersEl.innerHTML='<button class="filter-btn active" data-cat="all">全部</button>'+categories.map(c=>`<button class="filter-btn" data-cat="${c}">${CATS[c]||c}</button>`).join('');

function render(){
  const q=searchEl.value.toLowerCase();
  const filtered=agents.filter(a=>{
    if(activeFilter!=='all'&&a.c!==activeFilter)return false;
    if(q&&!a.t.toLowerCase().includes(q)&&!a.d.toLowerCase().includes(q)&&!(CATS[a.c]||'').toLowerCase().includes(q))return false;
    return true;
  });
  statsEl.textContent=`顯示 ${filtered.length} / ${agents.length} 個智慧體`;
  gridEl.innerHTML=filtered.map(a=>`<div class="card"><div class="card-cat">${CATS[a.c]||a.c}</div><h3>${a.t}</h3><p>${a.d}</p></div>`).join('');
}

filtersEl.addEventListener('click',e=>{
  if(!e.target.classList.contains('filter-btn'))return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter=e.target.dataset.cat;
  render();
});
searchEl.addEventListener('input',render);
render();
</script>
