const categories=[...new Set(agents.map(a=>a.c))].sort();
const filtersEl=document.getElementById('filters');
const gridEl=document.getElementById('grid');
const statsEl=document.getElementById('stats');
const searchEl=document.getElementById('search');
let activeFilter='all';

filtersEl.innerHTML='<button class="filter-btn active" data-cat="all">全部</button>'+categories.map(c=>`<button class="filter-btn" data-cat="${c}">${CATS[c]||c}</button>`).join('');

function render(){
  const q=searchEl.value.toLowerCase();
  const filtered=agents.filter(a=>{
    if(activeFilter!=='all'&&a.c!==activeFilter)return false;
    if(q&&!a.t.toLowerCase().includes(q)&&!a.d.toLowerCase().includes(q)&&!(CATS[a.c]||'').toLowerCase().includes(q))return false;
    return true;
  });
  statsEl.textContent=`顯示 ${filtered.length} / ${agents.length} 個智慧體`;
  gridEl.innerHTML=filtered.map((a,i)=>`<div class="card" onclick="openModal(${agents.indexOf(a)})"><div class="card-cat">${CATS[a.c]||a.c}</div><h3>${a.t}</h3><p>${a.d}</p></div>`).join('');
}

let detailMap=null;
async function loadDetails(){
  if(detailMap)return detailMap;
  try{
    const r=await fetch('/public/agents_detail.json');
    const arr=await r.json();
    detailMap={};
    arr.forEach(a=>{detailMap[a.file.replace('.md','')]=a.full});
    return detailMap;
  }catch(e){return null;}
}
async function openModal(idx){
  const a=agents[idx];
  const catLabel=CATS[a.c]||a.c;
  document.getElementById('modalCat').textContent=catLabel;
  document.getElementById('modalTitle').textContent=a.t;
  document.getElementById('modalDesc').textContent=a.d+'\n\n載入完整內容中...';
  document.getElementById('modalLink').style.display='none';
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
  if(a.f){
    document.getElementById('modalLink').href='https://github.com/jnMetaCode/agency-agents-zh';
    document.getElementById('modalLink').style.display='inline-block';
  }
  const dm=await loadDetails();
  if(dm&&a.f&&dm[a.f]){
    document.getElementById('modalDesc').textContent=dm[a.f];
  }else{
    document.getElementById('modalDesc').textContent=a.d;
  }
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

function toggleTheme(){
  const html=document.documentElement;
  const btn=document.getElementById('themeToggle');
  if(html.getAttribute('data-theme')==='light'){
    html.removeAttribute('data-theme');
    btn.innerHTML='&#9790; 淺色模式';
    localStorage.setItem('theme','dark');
  }else{
    html.setAttribute('data-theme','light');
    btn.innerHTML='&#9728; 深色模式';
    localStorage.setItem('theme','light');
  }
}
(function(){
  const saved=localStorage.getItem('theme');
  if(saved==='light'){
    document.documentElement.setAttribute('data-theme','light');
    document.getElementById('themeToggle').innerHTML='&#9728; 深色模式';
  }
})();

filtersEl.addEventListener('click',e=>{
  if(!e.target.classList.contains('filter-btn'))return;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter=e.target.dataset.cat;
  render();
});
searchEl.addEventListener('input',render);
render();
